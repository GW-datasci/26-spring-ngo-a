<div style="width:100%;">

  <style>
    @media (min-width: 900px) {
      .dw-sidebar {
        float: right;
        width: 300;
        margin: 0 0 1.5rem 2rem;
      }
    }

    @media (max-width: 899px) {
      .dw-sidebar {
        width: 100%;
        float: none;
        margin: 1.5rem 0;
      }
    }
  </style>

  <div class="dw-sidebar">

    <iframe 
      title="Timeline"
      aria-label="Table"
      id="datawrapper-chart-0r3aR"
      src="https://datawrapper.dwcdn.net/0r3aR/1/"
      scrolling="no"
      frameborder="0"
      style="width: 0; min-width: 100% !important; border: none;"
      height="725"
      data-external="1">
    </iframe>

    <script type="text/javascript">
      window.addEventListener("message", function(a) {
        if (a.data["datawrapper-height"]) {
          var e = document.querySelectorAll("iframe");
          for (var t in a.data["datawrapper-height"]) {
            for (var i = 0; i < e.length; i++) {
              if (e[i].contentWindow === a.source) {
                e[i].style.height = a.data["datawrapper-height"][t] + "px";
              }
            }
          }
        }
      });
    </script>

  </div>

</div>

<div style="clear: both;"></div>
